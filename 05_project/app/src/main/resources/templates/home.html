<!DOCTYPE html>
<html>
<head data-th-replace="~{header :: head}"></head>
<body>

<header data-th-replace="~{header :: #page-header}"></header>

<h1>환영합니다!</h1>
<p>이 사이트는 팀 프로젝트를 관리하는 서비스를 제공합니다.</p>

<script>
    function openPopup() {
        var width = 300; // 경고창 같은 팝업 창 너비
        var height = 200; // 경고창 같은 팝업 창 높이
        var left = (window.innerWidth - width) / 2; // 중앙에 위치
        var top = (window.innerHeight - height) / 2; // 중앙에 위치

        // 팝업 창 열기
        var popupWindow = window.open("", "popupWindow", "width=" + width + ",height=" + height + ",scrollbars=no,resizable=no,left=" + left + ",top=" + top);

        // 팝업창 내용 추가
        popupWindow.document.write("<html><head><title>팝업 창</title><style>body {border: 2px solid black; text-align: center; margin-top: 20px;}</style></head><body><h3>작은 팝업</h3><p>여행 팝업입니다.</p></body></html>");
    }
</script>
</body>
</html>
