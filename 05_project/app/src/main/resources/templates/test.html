<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AJAX 모달 팝업 예시</title>
    <style>
        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }
        .modal-content {
            background-color: white;
            margin: 15% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 50%;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            animation: fadeIn 0.3s;
        }
        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
        }
        .close:hover, .close:focus {
            color: black;
            text-decoration: none;
            cursor: pointer;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

<button id="startButton">팝업 열기</button>

<!-- 모달 팝업 -->
<div id="myModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h2>서버에서 불러온 데이터</h2>
        <div id="serverData">서버에서 데이터를 불러오는 중...</div> <!-- 여기에 서버 데이터를 표시 -->
    </div>
</div>

<script>
    const modal = document.getElementById("myModal");
    const btn = document.getElementById("startButton");
    const span = document.getElementsByClassName("close")[0];
    const serverDataDiv = document.getElementById("serverData");

    btn.onclick = function() {
        modal.style.display = "block";

        // AJAX 요청을 통해 서버에서 데이터를 가져옴
        const xhr = new XMLHttpRequest();
        xhr.open("GET", "/main", true); // 자바 서버로 GET 요청을 보냄
        xhr.onreadystatechange = function() {
            if (xhr.readyState == 4 && xhr.status == 200) {
                // 서버에서 받은 데이터를 모달 팝업 안에 표시
                serverDataDiv.innerHTML = xhr.responseText;
            }
        };
        xhr.send();
    }

    span.onclick = function() {
        modal.style.display = "none";
    }

    window.onclick = function(event) {
        if (event.target == modal) {
            modal.style.display = "none";
        }
    }
</script>

</body>
</html>
