<!DOCTYPE html>
<html lang="ko"> <!-- 언어 속성을 추가하여 한국어로 설정 -->
<head>
  <meta charset="UTF-8"> <!-- 문자 인코딩 설정 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- 반응형 디자인을 위한 뷰포트 설정 -->
  <title>로그인</title>
  <script>
    async function login(event) {
        event.preventDefault();
        const formData = {
            email: document.getElementById("email").value,
            password: document.getElementById("password").value
        };

        try {
            const response = await fetch("/user/login", { // URL 경로 수정
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(formData)
            });

            if (response.ok) {
                const token = await response.text();
                localStorage.setItem('token', token);
                alert("로그인 성공!");
                window.location.href = "/app/main"; // 메인 페이지로 리디렉션
            } else {
                alert("로그인 실패! 이메일이나 비밀번호를 확인하세요.");
            }
        } catch (error) {
            console.error("Error during login:", error);
            alert("로그인 중 오류가 발생했습니다. 나중에 다시 시도하세요."); // 에러 메시지 추가
        }
    }
  </script>
</head>
<body>
<h1>로그인</h1>
<form onsubmit="login(event)">
  <label for="email">이메일:</label>
  <input type="email" id="email" name="email" required><br><br>

  <label for="password">비밀번호:</label>
  <input type="password" id="password" name="password" required><br><br>

  <input type="submit" value="로그인">
</form>
<p>계정이 없으신가요? <a href="/app/signup.html">회원가입</a></p>
</body>
</html>
