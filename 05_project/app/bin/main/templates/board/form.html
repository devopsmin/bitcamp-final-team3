<!DOCTYPE html>
<html>

<head data-th-replace="~{header :: head}">
</head>
<header data-th-replace="~{header :: #page-header}"/>

<body>
<h1>게시글 등록</h1>

<!-- 데이터 확인용 -->
<span data-th-if="${trips}"
      data-th-data="${trips.size()}">
  <p>데이터가 존재합니다.</p>
</span>
<span data-th-unless="${trips}">
  <p>데이터가 없습니다.</p>
</span>

<table>
  <thead>
  <tr>
    <th>여행번호</th>
    <th>여행제목</th>
  </tr>
  </thead>
  <tbody>
    <tr data-th-each="trip : ${trips}" data-th-object="${trip}">
      <td><span data-th-text="*{tripNo}">번호</span></td>
      <td><span data-th-text="*{tripTitle}">제목</span></td>
    </tr>
  </tbody>
</table>

<form action='add' method="post">

  <br>
  제목: <input name='boardTitle' type='text'><br>
  내용: <textarea name='boardContent'></textarea><br>
  태그: <input name='boardTag' type='text'><br>
  <input type='submit' value='등록'>
</form>

</body>
</html>
